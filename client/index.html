<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>FertilizerPro - Sustainable Fertilizer Usage for Higher Yield</title>
    <meta name="description" content="Optimize your crop yields with sustainable fertilizer recommendations. Get personalized NPK calculations based on soil analysis and farm characteristics for better harvests." />
    <meta name="keywords" content="fertilizer calculator, NPK recommendations, sustainable agriculture, soil analysis, crop yield optimization, farming efficiency" />
    
    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://fertilizerpro.com/" />
    <meta property="og:title" content="FertilizerPro - Sustainable Fertilizer Usage Platform" />
    <meta property="og:description" content="Optimize crop yields with personalized fertilizer recommendations. Calculate NPK requirements based on soil analysis and sustainable farming practices." />
    <meta property="og:image" content="https://fertilizerpro.com/og-image.jpg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://fertilizerpro.com/" />
    <meta property="twitter:title" content="FertilizerPro - Sustainable Fertilizer Usage Platform" />
    <meta property="twitter:description" content="Optimize crop yields with personalized fertilizer recommendations. Calculate NPK requirements based on soil analysis and sustainable farming practices." />
    <meta property="twitter:image" content="https://fertilizerpro.com/og-image.jpg" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "FertilizerPro",
        "url": "https://fertilizerpro.com",
        "description": "Platform for sustainable fertilizer usage and crop yield optimization",
        "potentialAction": {
            "@type": "SearchAction",
            "target": "https://fertilizerpro.com/calculator?q={search_term_string}",
            "query-input": "required name=search_term_string"
        }
    }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- This is a replit script which adds a banner on the top of the page when opened in development mode outside the replit environment -->
    <script type="text/javascript" src="https://replit.com/public/js/replit-dev-banner.js"></script>
  </body>
</html>
